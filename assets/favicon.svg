<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" width="32" height="32">
  <!-- Background -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ddb65c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c49135;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#080b12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0e1420;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Dark background circle -->
  <circle cx="16" cy="16" r="15" fill="url(#grad2)" stroke="#ddb65c" stroke-width="0.5" opacity="0.95"/>
  
  <!-- Center circle with gradient -->
  <circle cx="16" cy="16" r="12" fill="url(#grad1)" opacity="0.8"/>
  
  <!-- M letter shape -->
  <g fill="white" opacity="0.95">
    <!-- Left vertical -->
    <rect x="8" y="10" width="2" height="12" rx="1"/>
    
    <!-- Right vertical -->
    <rect x="22" y="10" width="2" height="12" rx="1"/>
    
    <!-- Peak triangle top -->
    <polygon points="10,10 16,6 22,10" fill="white" opacity="0.95"/>
    
    <!-- Center valley -->
    <rect x="14.5" y="10" width="3" height="8" fill="url(#grad2)" opacity="0.6"/>
  </g>
  
  <!-- Accent dots -->
  <circle cx="10" cy="24" r="1" fill="#ddb65c" opacity="0.7"/>
  <circle cx="16" cy="24" r="1" fill="#ddb65c" opacity="0.7"/>
  <circle cx="22" cy="24" r="1" fill="#ddb65c" opacity="0.7"/>
</svg>
